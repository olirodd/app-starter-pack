name: iOS Compile

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Compile iOS Targets
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Override Gradle Java home
        run: echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

      - name: Compile iOS targets
        run: ./gradlew compileKotlinIosArm64 compileKotlinIosSimulatorArm64
